name: linsmart_director
description: A high-performance offline AI video assistant for creators.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  path_provider: ^2.0.15
  mediapipe_llm: ^0.1.0 # 2026 离线推理引擎
  faster_whisper: ^1.2.0 # 本地语音识别
  flutter_npu_adapter: ^0.5.0 # 华为麒麟芯片 NPU 适配器

flutter:
  uses-material-design: true
  assets:
    - assets/models/
